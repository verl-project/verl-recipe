hydra:
  searchpath:
    - file://verl/trainer/config

defaults:
  - ppo_megatron_trainer
  - _self_

# config for the rollout (only for resource isolation)
rollout:
  # Number of nodes used in the rollout
  nnodes: 1
  # Number of GPUs per node
  n_gpus_per_node: 8

actor_rollout_ref:
  hybrid_engine: False

  teacher:
    server_ip: localhost
    server_port: 15555
    overlap_rollout: False
    n_server_workers: 1

trainer:
  scheduler: one_step_off