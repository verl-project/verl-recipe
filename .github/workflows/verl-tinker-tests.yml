name: verl-tinker tests

on:
  pull_request:
    paths:
      - "verl_tinker/**"
  push:
    branches:
      - main
      - v0.*
    paths:
      - "verl_tinker/**"

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python 3.12
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
      - name: Install uv
        run: python -m pip install "uv>=0.9.8,<0.12"
      - name: Install dependencies
        working-directory: verl_tinker
        run: uv sync --group test --locked
      - name: Run unit tests
        working-directory: verl_tinker
        run: uv run --group test pytest tests
