server:
  host: ${oc.env:TINKER_SERVER_HOST,0.0.0.0}
  port: ${oc.env:TINKER_SERVER_PORT,8000}
  ray_address: ${oc.env:RAY_ADDRESS,local}
  checkpoint_dir: ${oc.env:TINKER_CHECKPOINT_DIR,/tmp/tinker-checkpoints}
  server_max_runtime: ${oc.env:TINKER_SERVER_MAX_RUNTIME,null} # an optional variable for the maximum uptime of the server, null means infinite
  max_concurrent_samples: ${oc.env:TINKER_SERVER_MAX_CONCURRENT_SAMPLES,32}
  enable_offload: true
  disable_config_fix: false

actor_rollout_ref: # this is the same as verl's config, this field is ALWAYS required.
  actor:
    strategy: veomni
    use_kl_loss: false
    ppo_mini_batch_size: 16
    veomni:
      cross_entropy_loss_implementation: chunk_loss
      param_offload: false
      optimizer_offload: false
    optim:
      lr_scheduler_type: constant
      lr: 1.0e-06
    profiler:
      enable: true
      all_ranks: true
      tool_config:
        torch:
          contents: [cuda, cpu]
  rollout:
    name: vllm
    tensor_model_parallel_size: 4
    gpu_memory_utilization: 0.4
  ref:
    enable: false
  model:
    path: ${oc.env:TINKER_SERVER_MODEL,Qwen/Qwen3-1.7B}

algorithm:
  adv_estimator: sft

data:
  train_batch_size: 64
  max_prompt_length: 4096
  max_response_length: 10000

trainer:
  logger:
  - console
  project_name: verl_tinker_server
  experiment_name: tinker_server_actor_rollout
  nnodes: 1
  n_gpus_per_node: ${oc.env:TINKER_SERVER_N_GPUS_PER_NODE,8}

global_profiler:
  tool: torch
  steps: [3]
  profile_continuous_steps: false
  save_path: outputs/profile
  all_ranks: true
