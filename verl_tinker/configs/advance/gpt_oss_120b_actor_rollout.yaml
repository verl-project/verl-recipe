# Note: this config requires 16 B200 gpus or more

server:
  host: ${oc.env:TINKER_SERVER_HOST,0.0.0.0}
  port: ${oc.env:TINKER_SERVER_PORT,8000}
  ray_address: ${oc.env:RAY_ADDRESS,local}
  # BF16 checkpoint staging needs roughly 240 GB per worker, plus Ray/runtime headroom.
  disk_check_path: ${oc.env:TINKER_SERVER_DISK_CHECK_PATH,/tmp}
  disk_check_min_free_gb: ${oc.decode:${oc.env:TINKER_SERVER_MIN_DISK_FREE_GB,350}}
  checkpoint_dir: ${oc.env:TINKER_CHECKPOINT_DIR,/tmp/tinker-checkpoints}
  server_max_runtime: ${oc.env:TINKER_SERVER_MAX_RUNTIME,null} # an optional variable for the maximum uptime of the server, null means infinite
  max_concurrent_samples: ${oc.decode:${oc.env:TINKER_SERVER_MAX_CONCURRENT_SAMPLES,4}}
  enable_offload: true
  auto_merge_verl_default_config: true

actor_rollout_ref: # this is the same as verl's config, this field is ALWAYS required.
  # this is a bit more customized as it's a larger model
  actor:
    strategy: veomni
    use_kl_loss: false
    optim:
      lr_scheduler_type: constant
      lr: 1.0e-06
    veomni:
      # Expert parallelism for MoE expert weights
      fsdp_size: -1
      expert_parallel_size: 8
      # GPT-OSS attention uses sliding windows and learnable sinks, which are
      # supported by VeOmni's FlashAttention 4 integration.
      attn_implementation: flash_attention_4
      # GPT-OSS uses interleaved gate/up projections; use its Quack backend.
      moe_implementation: fused_quack
    use_dynamic_bsz: true
    ppo_mini_batch_size: 1
    ppo_micro_batch_size_per_gpu: 1


  rollout:
    name: vllm
    tensor_model_parallel_size: 8
    data_parallel_size: 1
    pipeline_model_parallel_size: 1
    n: 4
    gpu_memory_utilization: 0.6
    quantization: null
    load_format: safetensors
    mode: async
    prompt_length: 4096
    response_length: 10000
    max_model_len: 16384
    calculate_log_probs: true
    log_prob_use_dynamic_bsz: true
    log_prob_max_token_len_per_gpu: 16384
    log_prob_micro_batch_size_per_gpu: 1
    enable_chunked_prefill: true
    max_num_seqs: 4
    max_num_batched_tokens: 8192
    free_cache_engine: true
    enforce_eager: false

  ref:
    enable: false

  model:
    path: ${oc.env:TINKER_SERVER_MODEL,unsloth/gpt-oss-120b-BF16}
    use_remove_padding: true
    enable_gradient_checkpointing: true

algorithm:
  adv_estimator: grpo
  use_kl_in_reward: false

data:
  train_batch_size: 64
  max_prompt_length: 4096
  max_response_length: 10000

trainer:
  logger:
  - console
  project_name: verl_tinker_server
  experiment_name: tinker_server_gpt_oss_120b_actor_rollout_4nodes
  nnodes: 4
  n_gpus_per_node: 8
